<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}МастерГрад{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Jost', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f5f5f5 0%, #e8f0fe 100%);
            min-height: 100vh;
        }

        /* Логотип - в левом верхнем углу */
        .logo {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 100;
        }

        .logo a {
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .logo .master {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: 1px;
            line-height: 1.2;
        }

        .logo .grad {
            font-size: 28px;
            font-weight: 700;
            color: #BC5A7F;
            letter-spacing: 1px;
            line-height: 1.2;
        }

        /* Контейнер для формы - центрирован по горизонтали, но с отступом сверху */
        .container {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(188, 90, 127, 0.15);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border: 1px solid rgba(188, 90, 127, 0.3);

            /* Центрирование по горизонтали, отступ сверху */
            margin: 0 auto;
            position: relative;
            top: 120px;
            margin-bottom: 120px;
        }

        h2 {
            text-align: center;
            color: #1a1a1a;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-family: 'Jost', sans-serif;
            transition: all 0.3s;
            background: #ffffff;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #BC5A7F;
            box-shadow: 0 0 0 3px rgba(188, 90, 127, 0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #BC5A7F;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Jost', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: #a14d6e;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(188, 90, 127, 0.3);
        }

        .links {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .links a {
            color: #BC5A7F;
            text-decoration: none;
            font-weight: 500;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .errorlist {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 5px;
            list-style: none;
        }

        /* Кнопки выбора роли */
        .role-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .role-btn {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: #f5f5f5;
            color: #333;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            font-family: 'Jost', sans-serif;
        }

        .role-btn.active {
            background: #BC5A7F;
            color: white;
            border-color: #BC5A7F;
        }

        .hidden {
            display: none;
        }

        /* Сообщения об ошибках */
        .alert {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            background: #fee;
            color: #e74c3c;
            border: 1px solid #fcc;
            font-size: 14px;
        }

        /* Дополнительные поля для организатора */
        .organizer-fields {
            transition: all 0.3s;
        }
    </style>
</head>
<body>
    <!-- Логотип в левом верхнем углу -->
    <div class="logo">
        <a href="/">
            <div class="master">Мастер</div>
            <div class="grad">Град</div>
        </a>
    </div>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
